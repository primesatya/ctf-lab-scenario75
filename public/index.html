<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureBank Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 400px;
      padding: 40px;
      border: 1px solid #00ff41;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
    }
    h1 { text-align: center; margin-bottom: 30px; font-size: 1.4rem; letter-spacing: 2px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #00cc33; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      background: #111;
      border: 1px solid #00ff41;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      outline: none;
    }
    input:focus { border-color: #00ffcc; box-shadow: 0 0 6px rgba(0,255,204,0.4); }
    button {
      width: 100%;
      padding: 12px;
      background: #00ff41;
      color: #0a0a0a;
      border: none;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      margin-top: 10px;
    }
    button:hover { background: #00cc33; }
  </style>
</head>
<body>
  <!--
  =============================================
   _____                         ____              _
  / ____|                       |  _ \            | |
 | (___   ___  ___ _   _ _ __  | |_) | __ _ _ __ | | __
  \___ \ / _ \/ __| | | | '__| |  _ < / _` | '_ \| |/ /
  ____) |  __/ (__| |_| | |    | |_) | (_| | | | |   <
 |_____/ \___|\___|\__,_|_|    |____/ \__,_|_| |_|_|\_\

  [HINT] Good bots check the rules before crawling...
         Have you read /robots.txt yet?
  =============================================
  -->
  <div class="container">
    <h1>[ SECUREBANK LOGIN ]</h1>
    <form id="loginForm" action="/api/login" method="POST">
      <div class="form-group">
        <label for="username">USERNAME</label>
        <input type="text" id="username" name="username" placeholder="enter username" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="password">PASSWORD</label>
        <input type="password" id="password" name="password" placeholder="enter password" />
      </div>
      <button type="submit">&gt;&gt; LOGIN</button>
    </form>
  </div>
</body>
</html>
